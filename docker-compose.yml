name: ${COMPOSE_PROJECT_NAME:-stock_data_repo}

services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-data-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockdata}
      POSTGRES_USER: ${POSTGRES_USER:-stockdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - /mnt/user/appdata/stock-data-repository/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockdata} -d ${POSTGRES_DB:-stockdata}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - stock-data-backend

  migrate:
    build: .
    image: stock-data-repository:local
    container_name: stock-data-migrate
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-data-backend

  api:
    image: stock-data-repository:local
    pull_policy: never
    container_name: stock-data-api
    restart: unless-stopped
    env_file: .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - /mnt/user/appdata/stock-data-repository/data:/data
    ports:
      - "8787:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - stock-data-backend
      - paradiesplayground

  worker:
    image: stock-data-repository:local
    pull_policy: never
    container_name: stock-data-worker
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "app.scheduler"]
    volumes:
      - /mnt/user/appdata/stock-data-repository/data:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - stock-data-backend

  mcp:
    image: stock-data-repository:local
    pull_policy: never
    container_name: stock-data-mcp
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "app.mcp_server"]
    ports:
      - "8788:8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8001), 5).close()"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - stock-data-backend
      - paradiesplayground

  tunnel:
    build:
      context: https://github.com/openai/tunnel-client.git#v0.0.10
      args:
        GIT_SHA: 105e17a
        GOPROXY: https://proxy.golang.org
    image: stock-data-tunnel-client:0.0.10
    container_name: stock-data-tunnel
    restart: unless-stopped
    environment:
      CONTROL_PLANE_TUNNEL_ID: ${OPENAI_TUNNEL_ID:?Set OPENAI_TUNNEL_ID in .env}
      CONTROL_PLANE_API_KEY: ${OPENAI_TUNNEL_API_KEY:?Set OPENAI_TUNNEL_API_KEY in .env}
      MCP_SERVER_URL: http://mcp:8001/mcp
      LOG_LEVEL: ${TUNNEL_LOG_LEVEL:-info}
      LOG_FORMAT: json
      HEALTH_LISTEN_ADDR: ":8080"
    ports:
      - "${TUNNEL_HEALTH_BIND:-127.0.0.1}:8789:8080"
    depends_on:
      mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - stock-data-backend

networks:
  stock-data-backend:
    driver: bridge
  paradiesplayground:
    external: true
